# deployment/nginx.conf
# Nginx reverse proxy: port 80 → Streamlit port 8501
# WebSocket upgrade headers are required for Streamlit's live UI.
#
# Installed to: /etc/nginx/sites-available/bi-orchestrator
# Enabled via:  ln -s .../sites-available/bi-orchestrator .../sites-enabled/

server {
    listen 80;
    server_name _;          # matches any hostname / bare IP

    # Increase timeouts for long-running LLM queries
    proxy_read_timeout  120s;
    proxy_send_timeout  120s;

    location / {
        proxy_pass         http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # Required for Streamlit WebSocket (live UI updates)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Streamlit static assets
    location /_stcore/ {
        proxy_pass         http://127.0.0.1:8501/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
